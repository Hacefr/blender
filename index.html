<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRENDER</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- MAIN MENU LAYER -->
    <div id="main-menu" class="screen">
        <h1 class="game-title">BRENDER</h1>
        <div class="menu-buttons">
            <button onclick="changeState('PLAY')">PLAY GAME (START LEVEL 1)</button>
            
            <!-- DEV DROP-DOWN LEVEL TESTER -->
            <div style="background: #11111a; padding: 15px; border-radius: 6px; border: 1px dashed #ff3366; margin: 15px 0;">
                <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #ffcc00; font-size: 0.9rem;">
                    ⚙️ DEV TESTER: SELECT LEVEL
                </label>
                <select id="dev-level-select" style="width: 100%; padding: 10px; background: #252538; color: white; border: 2px solid #444; font-size: 1.1rem; font-weight: bold; border-radius: 4px; cursor: pointer; text-align: center;">
                    <!-- Filled automatically by game.js -->
                </select>
                <button onclick="triggerDevLevelTest()" style="margin-top: 10px; padding: 10px; font-size: 1rem; background: #ff3366; border-color: #ff6699;">
                    LAUNCH SELECTED LEVEL
                </button>
            </div>

            <button onclick="changeState('SETTINGS')">SETTINGS</button>
            <button onclick="changeState('EXTRAS')">CHALLENGES (EXTRAS)</button>
        </div>
    </div>

    <!-- SETTINGS LAYER -->
    <div id="settings-menu" class="screen hidden">
        <h2>SETTINGS</h2>
        <div class="settings-content">
            <label>Master Volume: <input type="range" min="0" max="100" value="80"></label>
            <br><br>
            <label><input type="checkbox"> Colorblind Wire Mode</label>
        </div>
        <button class="back-btn" onclick="changeState('MENU')">BACK TO MENU</button>
    </div>

    <!-- EXTRAS / CHALLENGES LAYER -->
    <div id="extras-menu" class="screen hidden">
        <h2>CHALLENGES</h2>
        <p>Experimental modes live here!</p>
        <button class="back-btn" onclick="changeState('MENU')">BACK TO MENU</button>
    </div>

    <!-- GAMEPLAY CANVAS LAYER -->
    <div id="gameplay-screen" class="screen hidden">
        <div id="level-hud">LEVEL: <span id="hud-level-num">1</span></div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <button class="back-btn" onclick="changeState('MENU')">QUIT TO MENU</button>
    </div>

    <!-- CORE UI INITIALIZED FIRST -->
    <script src="js/ui.js"></script>
    
    <!-- SUB-MODULE SYSTEMS -->
    <script src="js/characters.js"></script>
    <script src="js/trash.js"></script>
    <script src="js/wires.js"></script>
    <script src="js/levels.js"></script>
    
    <!-- MAIN ENGINE CONTROLLER KICKS IT ALL OFF -->
    <script src="game.js"></script>
</body>
</html>
